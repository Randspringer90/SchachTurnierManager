name: Bug melden
description: Melde einen Fehler im SchachTurnierManager.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Danke für die Meldung. Bitte keine privaten Teilnehmerlisten, Telefonnummern oder E-Mail-Adressen öffentlich posten.
  - type: input
    id: version
    attributes:
      label: App-Version
      description: Siehst du im Dashboard oben, z. B. 0.11.2.
      placeholder: "0.11.2"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Bereich
      options:
        - Teilnehmerverwaltung
        - Auslosung / Schweizer System
        - Ergebnisse / Rundenabschluss
        - Tabelle / Wertungen
        - Import / Export / Druck
        - Externe Spielersuche FIDE/DSB/ThSB
        - Portable App / Installation
        - Sonstiges
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Was ist passiert?
      description: Beschreibe den Fehler so konkret wie möglich.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Schritte zum Reproduzieren
      placeholder: |
        1. Turnier anlegen
        2. Teilnehmer importieren
        3. Runde auslosen
        4. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Erwartetes Verhalten
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Tatsächliches Verhalten
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs oder Fehlermeldungen
      description: Bitte sensible Daten vorher entfernen.
      render: text
  - type: input
    id: os
    attributes:
      label: Betriebssystem
      placeholder: "Windows 11"

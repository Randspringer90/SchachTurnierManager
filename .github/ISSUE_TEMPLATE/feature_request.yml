name: Feature-Wunsch
description: Schlage eine neue Funktion oder Verbesserung vor.
title: "[Feature]: "
labels: ["feature", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Welches Problem soll gelöst werden?
      description: Beschreibe den Turnierleiter- oder Nutzerfall.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Gewünschte Lösung
      description: Wie sollte die Funktion aus deiner Sicht funktionieren?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Bereich
      options:
        - Turnierformate
        - Auslosung / Pairing
        - Wertungen
        - Teilnehmer / externe Spielerdaten
        - Import / Export / Druck
        - UI / Bedienbarkeit
        - Installation / Release
        - Mobile / Zuschaueransicht
        - Sonstiges
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternativen oder Zusatzinfos
      description: Gibt es Beispiele aus anderer Software wie Swiss-Manager, Swiss-Chess oder Chess-Results?

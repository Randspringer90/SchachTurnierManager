name: Security-Gate

# Der Security-Gate führt ausschließlich vertrauenswürdigen Code aus dem Base-SHA aus.
# PR-Code wird hier weder ausgecheckt noch restauriert, gebaut, getestet oder installiert.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
    branches:
      - development
      - main
      - 'release/**'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: security-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  security-gate:
    name: security-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Vertrauenswürdigen Base-SHA auschecken
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
          persist-credentials: false
          path: trusted-base

      - name: Base-gebundene statische Security-Prüfung
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EXPECTED_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          REVIEW_OUTPUT: ${{ runner.temp }}/security-gate-static-review
        run: |
          $ErrorActionPreference = 'Stop'
          Set-Location trusted-base
          function Test-ShaBoundOwnerReview {
            $raw = & gh api "repos/$($env:REPOSITORY)/pulls/$($env:PR_NUMBER)/reviews" --paginate --slurp 2>$null
            if ($LASTEXITCODE -ne 0) { return $false }
            try { $pages = $raw | ConvertFrom-Json } catch { return $false }
            $marker = "STATIC-EXECUTION-APPROVED:$($env:EXPECTED_HEAD_SHA)"
            foreach ($page in @($pages)) {
              foreach ($review in @($page)) {
                if ([string]$review.user.login -ceq $env:REPOSITORY_OWNER -and
                    [string]$review.commit_id -ceq $env:EXPECTED_HEAD_SHA -and
                    ([string]$review.body).Trim() -ceq $marker -and
                    ([string]$review.state) -in @('COMMENTED','APPROVED')) { return $true }
              }
            }
            return $false
          }
          function Assert-OwnerExecutionApproval([bool]$RequireIntegrationBranch, [bool]$AllowBootstrap) {
            if ($env:AUTHOR_ASSOCIATION -ne 'OWNER' -or $env:HEAD_REPOSITORY -cne $env:REPOSITORY) {
              throw 'Ausführungsfreigabe ist ausschließlich für einen Owner-Branch im kanonischen Repository zulässig.'
            }
            if ($RequireIntegrationBranch) {
              $isIntegration = $env:HEAD_REF -cmatch '^integration/pr-[1-9][0-9]*-safe-adoption$'
              $isBootstrap = $AllowBootstrap -and $env:HEAD_REF -ceq 'security/STM-SEC-005-safe-pr-adoption'
              if (-not $isIntegration -and -not $isBootstrap) {
                throw 'Ausführungsfreigabe erfordert einen exakt nach dem Original-PR benannten Owner-Integrationsbranch.'
              }
            }
            if (-not (Test-ShaBoundOwnerReview)) {
              throw 'Ausführungsfreigabe fehlt oder ist nicht exakt an Owner und aktuellen PR-Head-SHA gebunden.'
            }
          }
          if ($env:BASE_BRANCH -ne 'development') {
            Assert-OwnerExecutionApproval $false $false
            & pwsh -NoLogo -NoProfile -File scripts/Test-PromptInjectionDefense.ps1 -NoArchive
            if ($LASTEXITCODE -ne 0) { throw 'Geschützter Release-/Main-Baseline-Gate fehlgeschlagen.' }
            'Release-/Main-PR: statische Adoption-Policy ist development-spezifisch; Owner- und Release-Gates bleiben zwingend.' >> $env:GITHUB_STEP_SUMMARY
            exit 0
          }
          $reviewScript = Join-Path (Get-Location) 'scripts/Invoke-SafePullRequestReview.ps1'
          if (-not (Test-Path -LiteralPath $reviewScript -PathType Leaf)) {
            Assert-OwnerExecutionApproval $true $true
            & pwsh -NoLogo -NoProfile -File scripts/Test-PromptInjectionDefense.ps1 -NoArchive
            if ($LASTEXITCODE -ne 0) { throw 'Bootstrap-Prompt-Injection-Gate fehlgeschlagen.' }
            & pwsh -NoLogo -NoProfile -File scripts/Test-RepositoryOpenSourceSafety.ps1 -ReportDir (Join-Path $env:RUNNER_TEMP 'bootstrap-repository-safety')
            if ($LASTEXITCODE -ne 0) { throw 'Bootstrap-Repository-Safety-Gate fehlgeschlagen.' }
            'Owner-Bootstrap: Das Base-Skript entsteht in diesem PR; unabhängiger Security-/Final-Review bleibt zwingend.' >> $env:GITHUB_STEP_SUMMARY
            exit 0
          }
          & pwsh -NoLogo -NoProfile -File $reviewScript -Repository $env:REPOSITORY -PullRequestNumber ([int]$env:PR_NUMBER) -BaseBranch $env:BASE_BRANCH -OutputDirectory $env:REVIEW_OUTPUT -StaticOnly -ExpectedHeadSha $env:EXPECTED_HEAD_SHA -ExpectedBaseSha $env:EXPECTED_BASE_SHA
          if ($LASTEXITCODE -ne 0) { throw 'Statischer Security-Review fehlgeschlagen.' }
          $report = Get-Content -Raw -LiteralPath (Join-Path $env:REVIEW_OUTPUT 'static-review.json') | ConvertFrom-Json
          "Security-Gate: ``$($report.decision)`` / ``$($report.riskClass)``; $($report.findingCount) Findings." >> $env:GITHUB_STEP_SUMMARY
          if ($report.decision -eq 'BLOCKED_UNVERIFIED') { throw 'Security-Gate blockiert nicht verifizierbare PR-Payload.' }
          if ($report.decision -ne 'SAFE_FOR_ISOLATED_BUILD') { Assert-OwnerExecutionApproval $true $false }

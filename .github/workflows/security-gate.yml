name: Security-Gate

# Öffentliches Repo: kein pull_request_target, PR-Code erhält keine Secrets.
# Prüft: keine gefährlichen Workflow-Trigger, keine committeten Secrets/Artefakte/PII-Muster,
# Hinweis auf Änderungen an Instruktionsquellen (Owner-Review). Nur Lese-Rechte.
on:
  pull_request:
    branches:
      - development
      - main
      - 'release/**'

permissions:
  contents: read

jobs:
  security-gate:
    name: security-gate
    runs-on: ubuntu-latest
    env:
      BASE_REF: ${{ github.base_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Kein pull_request_target-Trigger in Workflows
        shell: bash
        run: |
          set -euo pipefail
          # Nur die echte Trigger-Verwendung (Key mit Doppelpunkt, keine Kommentarzeile) ist verboten.
          # Der reine String in Prüf-/Kommentarzeilen (wie hier) ist erlaubt.
          if grep -rInE --include='*.yml' --include='*.yaml' '^[[:space:]]*[^#]*pull_request_target[[:space:]]*:' .github/workflows; then
            echo "::error::pull_request_target-Trigger ist nicht erlaubt (Secret-Exposition gegenüber fremdem PR-Code)."
            exit 1
          fi
          echo "OK: kein pull_request_target-Trigger."

      - name: Verbotene Dateien / Artefakte
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin "$BASE_REF"
          mapfile -t added < <(git diff --diff-filter=AM --name-only "origin/${BASE_REF}...HEAD")
          bad=0
          for f in "${added[@]:-}"; do
            [ -z "$f" ] && continue
            case "$f" in
              *.zip|*.7z|*.rar|*.nupkg|*.dmp|*.dump|*.db|*.sqlite|*.sqlite3|*.pfx|*.p12|*.pem|*.key|.env|*.env|*/.npmrc|.npmrc)
                echo "::error::Verbotene Datei im PR: $f"; bad=1 ;;
            esac
            case "$f" in
              bin/*|obj/*|*/bin/*|*/obj/*|dist/*|*/dist/*|node_modules/*|output/*|logs/*|tmp/*|*.trx|*/TestResults/*)
                echo "::error::Generiertes Artefakt im PR: $f"; bad=1 ;;
            esac
          done
          [ "$bad" -eq 0 ] && echo "OK: keine verbotenen Dateien/Artefakte."
          exit "$bad"

      - name: Secret-/PII-Muster in neuen Zeilen
        shell: bash
        run: |
          set -euo pipefail
          added="$(git diff --diff-filter=AM --unified=0 "origin/${BASE_REF}...HEAD" \
            -- . ':(exclude)docs/security/**' ':(exclude)scripts/*Security*' ':(exclude)scripts/*Git*' \
                 ':(exclude).github/workflows/security-gate.yml' \
            | grep -E '^\+' | grep -vE '^\+\+\+' || true)"
          fail=0
          # Detektionsmuster bewusst als Zeichenklassen, damit dieser Workflow nicht sich selbst triggert.
          if printf '%s\n' "$added" | grep -Eiq '(AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]*PRIVATE KEY-----|xox[baprs]-[0-9A-Za-z-]+|gh[pousr]_[0-9A-Za-z]{30,})'; then
            echo "::error::Mögliches Secret in neuen Zeilen gefunden."; fail=1
          fi
          if printf '%s\n' "$added" | grep -Eiq '(password|passwort|api[_-]?key|secret)\s*[:=]\s*[^ \t"'"'"'<>]{6,}'; then
            echo "::warning::Mögliches Klartext-Credential – bitte prüfen."
          fi
          [ "$fail" -eq 0 ] && echo "OK: keine offensichtlichen Secrets."
          exit "$fail"

      - name: Hinweis auf Instruktionsquellen (Owner-Review)
        shell: bash
        run: |
          set -euo pipefail
          changed="$(git diff --name-only "origin/${BASE_REF}...HEAD")"
          if printf '%s\n' "$changed" | grep -Eq '^(AGENTS\.md|\.claude/|\.agents/|agents/|config/|\.github/|docs/security/|docs/architecture/|scripts/.*(Security|Git|Commit))'; then
            echo "::notice::Änderungen an Instruktions-/Sicherheitsquellen erfordern Owner-Review (CODEOWNERS)."
          fi
          echo "OK."

  agent-integrity:
    name: agent-integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Agent-Instruction-Integrity (Instruction-Allowlist, Manifeste, keine Owner-Pfade/Secrets/Modell-Hardcoding)
        shell: pwsh
        run: pwsh -NoProfile -File scripts/Test-AgentInstructionIntegrity.ps1
